name: MoodSpace Deploy

on:
  push:
    branches: [ main ]

jobs:
  validate:
    name: Build & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Prisma Generate & Build Check
        run: npx prisma generate && npm run build
        env:
          DATABASE_URL: postgresql://mock:mock@localhost:5432/mock
          NEXTAUTH_SECRET: mock_secret_for_build
          NEXTAUTH_URL: http://localhost:3000
          GIPHY_API_KEY: mock
          SPOTIFY_CLIENT_ID: mock
          SPOTIFY_CLIENT_SECRET: mock

  deploy:
    name: Production Deploy
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.AWS_SSH_KEY }}
          command_timeout: 45m
          script: |
            cd ~/moodproject
            git pull origin main
            
            # Build e Deploy
            export DOCKER_BUILDKIT=1
            export COMPOSE_DOCKER_CLI_BUILD=1
            docker compose -f docker-compose.prod.yml up -d --build
            
            # Aguardar inicialização
            echo "Aguardando containers..."
            sleep 10
            
            # Migração oficial e segura
            echo "Aplicando migrations..."
            docker exec moodspace_app npx prisma migrate deploy
            
            # Limpeza
            docker system prune -f
            echo "Deploy concluído com sucesso!"

